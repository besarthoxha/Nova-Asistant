<html lang="sq"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
:root{
  --bg:#0a0a0f;--surface:#111118;--surface2:#1a1a24;
  --border:rgba(130,120,220,0.15);--border2:rgba(130,120,220,0.3);
  --accent:#8278dc;--accent2:#a99ef0;--glow:rgba(130,120,220,0.12);
  --text:#e8e6f8;--text3:#4e4a68;--user-bg:#1e1a3a;
  --user-border:rgba(130,120,220,0.4);--green:#1d9e75;--red:#e24b4a;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(130,120,220,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(130,120,220,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}

/* SETUP */
#setup{width:400px;background:var(--surface);border:0.5px solid var(--border2);border-radius:20px;padding:32px;display:flex;flex-direction:column;gap:18px;position:relative}
#setup::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.s-logo{font-size:26px;font-weight:700;letter-spacing:.1em}
.s-logo span{color:var(--accent2)}
.s-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-top:-10px}
.s-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:5px;letter-spacing:.05em}
.s-inp{width:100%;background:var(--surface2);border:0.5px solid var(--border2);border-radius:10px;padding:11px 14px;font-size:13px;font-family:'DM Mono',monospace;color:var(--text);outline:none;transition:border-color .2s}
.s-inp:focus{border-color:var(--accent)}
.s-inp::placeholder{color:var(--text3)}
.s-note{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);line-height:1.7}
.s-note a{color:var(--accent2);text-decoration:none}
.s-btn{width:100%;padding:12px;background:var(--accent);border:none;border-radius:10px;color:white;font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;letter-spacing:.05em;transition:background .15s}
.s-btn:hover{background:#6d63c7}
.s-err{font-family:'DM Mono',monospace;font-size:11px;color:var(--red);display:none;text-align:center}

/* APP */
#app{display:none;width:520px;height:92vh;max-height:760px;flex-direction:column;background:var(--surface);border:0.5px solid var(--border2);border-radius:20px;overflow:hidden;position:relative;box-shadow:0 0 80px rgba(130,120,220,0.08)}
#app::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);z-index:1}
#hdr{padding:14px 18px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--surface);flex-shrink:0}
#av{width:36px;height:36px;border-radius:50%;background:var(--glow);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:13px;color:var(--accent2);flex-shrink:0}
#hname{font-size:15px;font-weight:600;letter-spacing:.05em}
#hsub{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;display:flex;align-items:center;gap:5px;margin-top:2px}
#sdot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
#hdr-right{margin-left:auto;display:flex;gap:8px;align-items:center}
#reset-btn{width:28px;height:28px;border-radius:6px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
#reset-btn:hover{background:var(--glow);color:var(--accent2)}
#mbar{padding:7px 16px;border-bottom:0.5px solid var(--border);display:flex;gap:6px;align-items:center;flex-wrap:wrap;min-height:34px;background:var(--surface);flex-shrink:0}
.mtag{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:4px;background:var(--glow);color:var(--accent2);border:0.5px solid var(--border2)}
#msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.msg{display:flex;gap:8px;max-width:90%;animation:fi .2s ease}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.u{align-self:flex-end;flex-direction:row-reverse}
.msg.n{align-self:flex-start}
.bbl{padding:10px 14px;border-radius:14px;font-size:13.5px;line-height:1.6}
.n .bbl{background:var(--surface2);border:0.5px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.u .bbl{background:var(--user-bg);border:0.5px solid var(--user-border);border-bottom-right-radius:4px;color:var(--accent2)}
.mav{width:24px;height:24px;border-radius:50%;background:var(--glow);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:9px;color:var(--accent2);flex-shrink:0;align-self:flex-end}
.typing{display:flex;gap:4px;align-items:center;padding:13px 14px}
.dt{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:bn 1.2s infinite}
.dt:nth-child(2){animation-delay:.2s}.dt:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
#qrow{padding:6px 14px 4px;display:flex;gap:5px;flex-wrap:wrap;border-top:0.5px solid var(--border);flex-shrink:0}
.qb{font-size:11px;font-family:'DM Mono',monospace;padding:4px 10px;border-radius:6px;border:0.5px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s}
.qb:hover{background:var(--glow);color:var(--accent2);border-color:var(--accent)}
#iarea{padding:10px 14px 14px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
#inp{flex:1;border:0.5px solid var(--border2);border-radius:12px;padding:10px 14px;font-size:13.5px;font-family:'Syne',sans-serif;background:var(--surface2);color:var(--text);resize:none;outline:none;line-height:1.5;max-height:100px;overflow-y:auto;transition:border-color .2s}
#inp::placeholder{color:var(--text3)}
#inp:focus{border-color:var(--accent)}
.ibtn{width:36px;height:36px;border-radius:10px;border:0.5px solid var(--border2);background:var(--glow);color:var(--accent2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px;transition:all .15s}
.ibtn:hover{background:var(--accent);color:white;border-color:var(--accent)}
.ibtn:disabled{opacity:.3;cursor:not-allowed}
#mic-btn.listening{background:rgba(226,75,74,.2);border-color:var(--red);color:var(--red);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,.3)}50%{box-shadow:0 0 0 6px rgba(226,75,74,0)}}
#vstatus{display:none;padding:5px 16px;font-family:'DM Mono',monospace;font-size:10px;color:var(--red);border-top:0.5px solid var(--border);text-align:center;flex-shrink:0}
@media(max-width:540px){#app{width:100vw;height:100vh;border-radius:0;border:none}#setup{width:90vw;padding:24px}}
</style>
</head>
<body>

  <div>
    <div class="s-logo">NOV<span>A</span> 2.0</div>
    <div class="s-sub">asistent personal // besarti hoxha</div>
  </div>
  <div class="s-note">
    Vendos emrin tend per ta personalizuar Noven.<br>
    API keys ruhen ne server — te sigurta.
  </div>
  <div>
    <div class="s-label">// EMRI YT</div>
    <input class="s-inp" id="name-inp" type="text" placeholder="Besart" autocomplete="off">
  </div>
  <div class="s-err" id="s-err">Shkruaj emrin tend!</div>
  <button class="s-btn" onclick="startApp()">AKTIVIZO NOVAN ➤</button>
</div>

<!-- APP -->
<div id="app">
  <div id="hdr">
    <div id="av">N</div>
    <div>
      <div id="hname">NOVA 2.0</div>
      <div id="hsub"><span id="sdot"></span><span id="mcnt">mem://0 objects</span></div>
    </div>
    <div id="hdr-right">
      <button id="reset-btn" onclick="resetApp()" title="Reset">⚙</button>
   </div>
  </div>
  <div id="mbar"><span id="mtags"><span style="font-size:10px;font-family:monospace;color:var(--text3)">mem://empty — thuaj "mbaje mend..."</span></span></div>
  <div id="msgs"></div>
  <div id="vstatus">● duke degjuar...</div>
  <div id="qrow">
    <button class="qb" onclick="sq(&#39;Si eshte Inter kete sezon?&#39;)">inter</button>
    <button class="qb" onclick="sq(&#39;Mbaje mend: jam tifoz i Interit&#39;)">mbaje mend</button>
    <button class="qb" onclick="sq(&#39;Cfare di per mua?&#39;)">cfare di?</button>
    <button class="qb" onclick="sq(&#39;Bej nje shaka shqip&#39;)">shaka</button>
  </div>
  <div id="iarea">
    <textarea id="inp" placeholder="Shkruaj, Boss..." rows="1"></textarea>
    <button class="ibtn" id="mic-btn" onclick="toggleVoice()" title="Voice">🎤</button>
    <button class="ibtn" id="sb" onclick="go()">➤</button>
  </div>
</div>

<script>
const SYS=`Ti je Nova — asistent personal shqiptar i Besartit.

KARAKTERI:
- Inteligjent, classy, pak sarkastik — si FRIDAY e Tony Starkut, por shqip dhe me shpirt
- Flet gjithmone shqip, me stil dhe elegance
- E quan perdoruesin "Boss" ose "Zotëri Hoxha" — alternoji natyrshëm, mos e teproj
- Humor i thate dhe i mençur — e lejuar te jesh qesharak, por me klas
- Pergjigjesh shkurt, me substancë — mos flak fjale boshe
- Nuk fillon fjali me "Sigurisht!" apo "Natyrisht!" — shume robotike
- Mos perdor emoji
- Je besnik, profesional, me karakter te forte

FUTBOLLI:
- Besarti eshte tifoz fanatik i Inter Milanit
- Kur flitet per Inter, mbesh me pasion por me stil
- Rivalët (Juventus, Milan) — shaka me elegance

MEMORY SYSTEM:
- Ke notes, kliente, familje te Besartit
- Kur thote "mbaje mend X" — konfirmo me stil
- Perdore memoryen natyrshëm
- Kur pyet per memoria — shfaq gjithcka`;

let userName='Boss';
let mem={notes:[],clients:[],family:[]};
let hist=[];
let busy=false;
let recognition=null;
let isListening=false;

window.addEventListener('load',()=>{
  const savedName=localStorage.getItem('nova_name');
  if(savedName){
    userName=savedName;
    document.getElementById('name-inp').value=savedName;
  }
  const savedMem=localStorage.getItem('nova_mem');
  if(savedMem){try{mem=JSON.parse(savedMem);}catch(e){}}
  initVoice();
});

function startApp(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='flex';
  updMem();
  addMsg('nova','Cka kem sot Boss?');
  document.getElementById('inp').focus();
}
  window.addEventListener('load', function(){
  startApp();
});
  const errEl=document.getElementById('s-err');
  if(!name){
    errEl.style.display='block';
    setTimeout(()=>{errEl.style.display='none';},2000);
    return;
  }
  userName=name;
  localStorage.setItem('nova_name',name);
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='flex';
  updMem();
  addMsg('nova','Nova 2.0 online, '+name+'. Memory aktive dhe e kalibur. Cfare kemi sot?');
  document.getElementById('inp').focus();
}

function resetApp(){
  if(!confirm('Reset Nova?'))return;
  localStorage.clear();
  location.reload();
}

function updMem(){
  const total=mem.notes.length+mem.clients.length+mem.family.length;
  document.getElementById('mcnt').textContent='mem://'+total+' objects';
  const all=[...mem.notes,...mem.clients.map(c=>c.name||String(c)),...mem.family.map(f=>f.name||String(f))];
  document.getElementById('mtags').innerHTML=all.length===0
    ?'<span style="font-size:10px;font-family:monospace;color:var(--text3)">mem://empty — thuaj "mbaje mend..."</span>'
    :all.slice(0,6).map(n=>'<span class="mtag">'+String(n).slice(0,26)+'</span>').join('');
}

function saveMem(){localStorage.setItem('nova_mem',JSON.stringify(mem));}

function chkMem(text){
  if(/^mbaje mend/i.test(text)){
    const info=text.replace(/^mbaje mend\s*/i,'').trim();
    if(info){mem.notes.push(info);updMem();saveMem();}
  }
}

const msgsEl=document.getElementById('msgs');
const inpEl=document.getElementById('inp');
const sbEl=document.getElementById('sb');

function addMsg(role,text){
  const w=document.createElement('div');
  w.className='msg '+(role==='user'?'u':'n');
  if(role!=='user'){const a=document.createElement('div');a.className='mav';a.textContent='N';w.appendChild(a);}
  const b=document.createElement('div');b.className='bbl';b.textContent=text;
  w.appendChild(b);msgsEl.appendChild(w);msgsEl.scrollTop=msgsEl.scrollHeight;
}

function showTyp(){
  const d=document.createElement('div');d.className='msg n';d.id='typ';
  const a=document.createElement('div');a.className='mav';a.textContent='N';
  const b=document.createElement('div');b.className='bbl typing';
  b.innerHTML='<div class="dt"></div><div class="dt"></div><div class="dt"></div>';
  d.appendChild(a);d.appendChild(b);msgsEl.appendChild(d);msgsEl.scrollTop=msgsEl.scrollHeight;
}

function remTyp(){const t=document.getElementById('typ');if(t)t.remove();}

async function go(){
  const text=inpEl.value.trim();
  if(!text||busy)return;
  inpEl.value='';inpEl.style.height='auto';
  busy=true;sbEl.disabled=true;
  addMsg('user',text);
  chkMem(text);
  hist.push({role:'user',content:text});
  showTyp();
  try{
    const res=await fetch('/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-5',
        max_tokens:1000,
        system:SYS+'\n\nPerdoruesi: '+userName+'\nMEMORY:\n'+JSON.stringify(mem,null,2),
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:hist
      })
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const reply=data.content.filter(b=>b.type==='text').map(b=>b.text||'').join('');
    remTyp();addMsg('nova',reply);
    hist.push({role:'assistant',content:data.content});
  }catch(e){
    remTyp();addMsg('nova','Dicka shkoi keq, Boss: '+e.message);
  }
  busy=false;sbEl.disabled=false;
}

function sq(t){inpEl.value=t;go();}
inpEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();go();}});
inpEl.addEventListener('input',()=>{inpEl.style.height='auto';inpEl.style.height=Math.min(inpEl.scrollHeight,100)+'px';});

function initVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){document.getElementById('mic-btn').style.display='none';return;}
  recognition=new SR();
  recognition.lang='sq-AL';
  recognition.continuous=false;
  recognition.interimResults=false;
  recognition.onresult=e=>{inpEl.value=e.results[0][0].transcript;stopListening();go();};
  recognition.onerror=()=>stopListening();
  recognition.onend=()=>stopListening();
}

function toggleVoice(){
  if(isListening){stopListening();return;}
  isListening=true;
  document.getElementById('mic-btn').classList.add('listening');
  document.getElementById('vstatus').style.display='block';
  if(recognition)recognition.start();
}

function stopListening(){
  isListening=false;
  document.getElementById('mic-btn').classList.remove('listening');
  document.getElementById('vstatus').style.display='none';
  if(recognition){try{recognition.stop();}catch(e){}}
}

updMem();
</script>


</body></html>
